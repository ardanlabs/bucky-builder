name: Setup Vulkan SDK on Linux
description: |
  Downloads + extracts a prebuilt Vulkan SDK into the requested path so the
  whisper.cpp build can find vulkan headers / libs / glslc. Handles both x86_64
  (LunarG) and aarch64 (jakoch/vulkan-sdk-arm) — upstream LunarG does not ship
  ARM tarballs, so the ARM SDK comes from the community-maintained jakoch
  builds, mirroring how hybridgroup/llama-cpp-builder sources it.
inputs:
  path:
    description: Directory to extract the SDK into
    required: true
  version:
    description: Vulkan SDK version (e.g. 1.4.335.0)
    required: true
  osversion:
    description: Ubuntu major.minor (22.04 or 24.04) — selects the matching ARM tarball
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        mkdir -p "${{ inputs.path }}"
        cd "${{ inputs.path }}"

        arch=$(uname -m)
        case "$arch" in
          x86_64)
            # LunarG ships an x86_64 .tar.xz that extracts to <ver>/x86_64/.
            url="https://sdk.lunarg.com/sdk/download/${{ inputs.version }}/linux/vulkan_sdk.tar.xz"
            wget -O vulkan_sdk.tar.xz "$url"
            tar -xf vulkan_sdk.tar.xz --strip-components=1
            rm vulkan_sdk.tar.xz
            # LunarG's setup-env.sh lives at x86_64/setup-env.sh; symlink it
            # to the SDK root so the calling workflow can `source setup-env.sh`
            # without caring about arch.
            ln -sf x86_64/setup-env.sh setup-env.sh
            ;;
          aarch64|arm64)
            # jakoch/vulkan-sdk-arm release artifact filename pattern:
            #   vulkan-sdk-linux-arm64-<ver>-ubuntu-<osversion>.tar.gz
            url="https://github.com/jakoch/vulkan-sdk-arm/releases/download/sdk-${{ inputs.version }}/vulkan-sdk-linux-arm64-${{ inputs.version }}-ubuntu-${{ inputs.osversion }}.tar.gz"
            wget -O vulkan_sdk.tar.gz "$url"
            tar -xf vulkan_sdk.tar.gz --strip-components=1
            rm vulkan_sdk.tar.gz
            # Same convention as the LunarG SDK — make setup-env.sh top-level.
            if [ ! -f setup-env.sh ] && [ -f arm64/setup-env.sh ]; then
              ln -sf arm64/setup-env.sh setup-env.sh
            fi
            ;;
          *)
            echo "linux-setup-vulkan: unsupported arch $arch" >&2
            exit 1
            ;;
        esac
